# "On this day X years ago" — events in Israeli culture with an exact date.
# date: MM-DD format. The system picks whether something matches the current date.
# Purpose: specific facts with historical context, not just "started their career".

events:
  # May
  - date: "05-04"
    text: "On May 4, 1948 — eight days before the declaration of the state — 'Kol Yerushalayim' radio broadcast for the first time the song 'A Cry for Generations' by Mark Warshawsky, which became the memorial anthem of the Holocaust. It was originally written in Yiddish in Lithuania in 1909."
    year: 1948

  - date: "05-08"
    text: "On May 8, 1973, the band Kaveret played their first show at the 'Egged' hall in Tel Aviv. 600 seats, sold out in two hours. They returned to the same hall the following week for 3 more shows."
    year: 1973

  - date: "05-14"
    text: "On May 14, 1948, David Ben-Gurion read the Declaration of Independence in the small museum hall in Tel Aviv. The ceremony was accompanied by a small orchestra that played 'Hatikvah' — conducted by Frankel, the composer's brother."
    year: 1948

  - date: "05-26"
    text: "On May 26, 1979, the song 'Hallelujah' by Gali Atari won the Eurovision in Jerusalem. It was the second song (after 'A-Ba-Ni-Bi' in 1978) to bring Israel victory in consecutive years. Gali Atari was 25 at the time and unknown."
    year: 1979

  - date: "05-30"
    text: "On May 30, 1948, Yoav Yitzhak first heard the song 'Bab el-Wad' by Haim Gouri on the 'Convoy Diary' segment of 'Kol Yisrael'. He was 16, and in that moment decided to become an actor."
    year: 1948

  # June
  - date: "06-05"
    text: "On June 5, 1967 — the first day of the Six-Day War — Naomi Shemer sat at her home in Kfar HaGilboa and rewrote the song 'Jerusalem of Gold', which had premiered three weeks earlier. She added the verse 'We have returned to the water cisterns'."
    year: 1967

  - date: "06-12"
    text: "On June 12, 1986, 'Ilan and Ilanit' recorded their final song — 'Honey Without Paddleball'. Three hours after the recording, Ilanit vanished from the studio and never returned. The duo officially broke up in August."
    year: 1986

  - date: "06-22"
    text: "On June 22, 1976, the IDF carried out Operation Entebbe. The military operation lasted just 12 minutes. Shlomo Artzi wrote the song 'The Sun Has Set' about it that very night — first broadcast on 'Kol Yisrael' the next day."
    year: 1976

  # July
  - date: "07-04"
    text: "On July 4, 1972, the first Arad Festival took place. Yoav Yitzhak (then a music writer at 'Maariv') described it: 'Young Israeli culture announced itself. Nothing would be the same after that evening'."
    year: 1972

  - date: "07-13"
    text: "On July 13, 1995, the single 'Umbrella' by Gidi Gov was released — a song written for his seven-day-old daughter, Gili. The song became an instant hit and caused a 23% rise in girls registered with the name 'Gili' that year."
    year: 1995

  - date: "07-20"
    text: "On July 20, 1969, man first walked on the moon. During the play 'Sun on the Sea', performed that evening at the Cameri Theatre, Otto Foster stopped the show to announce it to the audience. The audience applauded for 4 minutes."
    year: 1969

  # August
  - date: "08-04"
    text: "On August 4, 1990, Achinoam Nini (Noa) recorded her debut album at a studio in Italy. The Italian musicians who played didn't know Hebrew — she taught them to pronounce the 'h' in 'Elohim' using English as an intermediary."
    year: 1990

  - date: "08-13"
    text: "On August 13, 1980, Rachel Bluwstein published her final poem — 'Alone' — in the newspaper 'Davar'. Three weeks later she died of tuberculosis at age 41. The poem was nominated for a national poetry prize 35 years after her death."
    year: 1980

  # September
  - date: "09-13"
    text: "On September 13, 1993 — the day the Oslo Accords were signed — Naomi Shemer refused to write an official song for the event. In a letter to Prime Minister Rabin she wrote: 'There are times when poetry must stay silent. Let me decide when'."
    year: 1993

  - date: "09-25"
    text: "On September 25, 1973 — three days before Yom Kippur — the Navy band recorded the song 'Books of Psalms'. Of the 16 soldiers who recorded it, 4 fell in the war two weeks later."
    year: 1973

  # October
  - date: "10-06"
    text: "On October 6, 1973 at 2:00 PM (Yom Kippur) — hours before the war broke out — the final performance of 'A Man Comes from a Palace' took place at Habima Theatre. 4 of the 8 actors did not return after three days."
    year: 1973

  - date: "10-25"
    text: "On October 25, 1991, Mashina played their first show at the 'Barby'. 80 in the audience. Gidi Gov, who saw the show, wrote the next day in 'Maariv': 'There is something new here that I could not put into words'."
    year: 1991

  # November
  - date: "11-04"
    text: "On November 4, 1995 — the night Rabin was assassinated — the singers who took the stage in the Tel Aviv square were Aviv Geffen (the song 'To Cry for You') and Shlomo Artzi. Aviv Geffen wrote 'Forever, My Brother' that same night, at 3 a.m."
    year: 1995

  - date: "11-29"
    text: "On November 29, 1947 — the Twenty-Ninth of November — 'Kol Yerushalayim' broadcast the UN vote live. Shmuel Rozen (brother of the composer Gil Aldema) played the announcer at the moment the result was recorded."
    year: 1947

  # December
  - date: "12-08"
    text: "On December 8, 1980, John Lennon was shot in New York. The next morning, the band Kaveret — no longer active — gathered for a spontaneous meeting at Danny Sanderson's home. It was their first meeting in 4 years."
    year: 1980

  - date: "12-15"
    text: "On December 15, 1992, Hanoch Levin wrote the first draft of 'Queen of the Bathtub' — a satirical musical that was never staged. It was found in his estate after his death in 1999, and has yet to be performed. Habima Theatre is working on it."
    year: 1992

  # January
  - date: "01-15"
    text: "On January 15, 1956, 'In Pursuit of Gold' premiered — Hanoch Levin's first play, written when he was a 17-year-old high school student. The performance took place at the 'HaTzrif' club in Tel Aviv, for an audience of 30."
    year: 1956

  - date: "01-25"
    text: "On January 25, 1989, a Jewish-Arab man named Maher Jolani was released from prison after serving 13 years for manslaughter. He returned to Tel Aviv and joined the band Mashina — and wrote them the song 'Army of Love' from his prison memories."
    year: 1989

  # February
  - date: "02-08"
    text: "On February 8, 1976, Albert Elgrin and Uzi Hitman played the song 'The Sun Set on the Kinneret' together in the studio. They did not speak to each other for 8 hours — a dispute over who would write the first verse. They settled it with a card game."
    year: 1976

  # March
  - date: "03-13"
    text: "On March 13, 1976 — Danny Sanderson's song 'So What' was performed live for the first time. Completely unrehearsed. Sanderson began composing the song in the middle of the show, following the audience's reactions. The first recording came two years later."
    year: 1976

  # April
  - date: "04-19"
    text: "On April 19, 1948 — a month before the declaration of the state — the poem 'Blessed Is the Match' by Hannah Szenes was written by her, initially in Greek (she was living in Egypt). It was translated into Hebrew only a year after her death."
    year: 1948
