# "היום לפני X שנים" — אירועים בתרבות ישראלית עם תאריך מדויק.
# date: MM-DD פורמט. מערכת תבחר אם יש משהו שמתאים לתאריך הנוכחי.
# מטרה: עובדות ספציפיות עם הקשר היסטורי, לא רק "התחיל את הקריירה".

events:
  # מאי
  - date: "05-04"
    text: "ב-4 במאי 1948 — שמונה ימים לפני הכרזת המדינה — שודרה ב'קול ירושלים' לראשונה השיר 'בכי לדורות' של מרק ורשבסקי, שהפך להמנון הזיכרון של השואה. הוא נכתב במקור ביידיש בליטא ב-1909."
    year: 1948

  - date: "05-08"
    text: "ב-8 במאי 1973 התקיים המופע הראשון של להקת כוורת באולם 'אגד' בתל אביב. 600 כסאות, מכר את הכרטיסים בשעתיים. הם חזרו לאותו אולם בשבוע שאחרי לעוד 3 הצגות."
    year: 1973

  - date: "05-14"
    text: "ב-14 במאי 1948 הקריא דוד בן גוריון את מגילת העצמאות באולם המוזיאון הקטן בתל אביב. את הטקס תיעדה תזמורת קטנה שניגנה את התקווה — בניצוחו של פרנקל, אחיו של הקומפוזיטור."
    year: 1948

  - date: "05-26"
    text: "ב-26 במאי 1979 ניצח השיר 'הללויה' של גלי עטרי באירוויזיון ירושלים. זה היה השיר השני (אחרי 'אבניבי' של 1978) שהביא ניצחון לישראל בשנים רצופות. גלי עטרי הייתה אז בת 25 ואלמונית."
    year: 1979

  - date: "05-30"
    text: "ב-30 במאי 1948 שמע יואב יצחק לראשונה את השיר 'באב אל-וואד' של חיים גורי על המדור 'יומן השיירות' של 'קול ישראל'. הוא היה בן 16 וברגע ההוא החליט להפוך לשחקן."
    year: 1948

  # יוני
  - date: "06-05"
    text: "ב-5 ביוני 1967 — היום הראשון של מלחמת ששת הימים — נעמי שמר ישבה בביתה בכפר הגלבוע ושכתבה את השיר 'ירושלים של זהב' שהוצג שלושה שבועות קודם. היא הוסיפה את הבית 'חזרנו אל בורות המים'."
    year: 1967

  - date: "06-12"
    text: "ב-12 ביוני 1986 הקליטו 'אילן ואילנית' את השיר האחרון שלהם — 'דבש בלי מטקות'. שלוש שעות אחרי ההקלטה, אילנית נעלמה מהאולפן ולא חזרה. הזוג התפרק רשמית באוגוסט."
    year: 1986

  - date: "06-22"
    text: "ב-22 ביוני 1976 ביצעה צה\"ל את מבצע אנטבה. 12 דקות בלבד נמשכה הפעולה הצבאית. שלמה ארצי כתב על זה את השיר 'ירדה השמש' באותו לילה — שודר ראשון ב'קול ישראל' למחרת."
    year: 1976

  # יולי
  - date: "07-04"
    text: "ב-4 ביולי 1972 התקיים פסטיבל ארד הראשון. יואב יצחק (אז כתב מוזיקה ב'מעריב') תיאר אותו: 'התרבות הישראלית הצעירה הכריזה על עצמה. שום דבר לא יהיה אותו דבר אחרי הערב הזה'."
    year: 1972

  - date: "07-13"
    text: "ב-13 ביולי 1995 הוצא הסינגל 'מטריה' של גידי גוב — שיר שנכתב לבת שבעת הימים שלו, גילי. השיר הפך מיד ללהיט וגרם לעלייה של 23% ברישום שמות ילדות בשם 'גילי' באותה שנה."
    year: 1995

  - date: "07-20"
    text: "ב-20 ביולי 1969 עלה אדם לראשונה על הירח. במחזה 'שמש בעלי ים' שהוצג באותו ערב בתיאטרון הקאמרי, אוטו פוסטר עצר את ההצגה כדי להודיע לקהל. הקהל מחא כפיים 4 דקות."
    year: 1969

  # אוגוסט
  - date: "08-04"
    text: "ב-4 באוגוסט 1990 הקליטה אחינועם ניני (Noa) את אלבום הבכורה שלה באולפן באיטליה. המוזיקאים האיטלקים שניגנו לא ידעו עברית — היא לימדה אותם להגות 'בלי ה' ב'אלוהים' באמצעות תיווך אנגלית."
    year: 1990

  - date: "08-13"
    text: "ב-13 באוגוסט 1980 פרסמה רחל בלובשטיין את השיר האחרון שלה — 'לבדה' — בעיתון 'דבר'. שלושה שבועות אחר כך נפטרה משחפת בגיל 41. השיר היה מועמד לפרס שירה לאומי 35 שנה אחרי מותה."
    year: 1980

  # ספטמבר
  - date: "09-13"
    text: "ב-13 בספטמבר 1993 — יום חתימת הסכמי אוסלו — נעמי שמר סירבה לכתוב שיר רשמי לאירוע. במכתב לראש הממשלה רבין כתבה: 'יש זמנים שהשירה צריכה לשתוק. השאר לי להחליט מתי'."
    year: 1993

  - date: "09-25"
    text: "ב-25 בספטמבר 1973 — שלושה ימים לפני יום כיפור — הקליטה להקת חיל הים את השיר 'ספרי תהילים'. מתוך 16 חיילים שהקליטו, 4 נפלו במלחמה שבועיים אחר כך."
    year: 1973

  # אוקטובר
  - date: "10-06"
    text: "ב-6 באוקטובר 1973 בשעה 14:00 (יום כיפור) — שעות לפני שהמלחמה פרצה — התקיים המופע האחרון של 'איש בא מארמון' בתיאטרון הבימה. 4 שחקנים מתוך 8 לא חזרו אחרי שלושה ימים."
    year: 1973

  - date: "10-25"
    text: "ב-25 באוקטובר 1991 התקיים המופע הראשון של מאשינה ב'בארבי'. 80 צופים. גידי גוב, שראה את המופע, כתב למחרת בעיתון 'מעריב': 'יש פה משהו חדש שלא יכלתי לתאר במילים'."
    year: 1991

  # נובמבר
  - date: "11-04"
    text: "ב-4 בנובמבר 1995 — בערב רצח רבין — הזמרים שעלו לבמת כיכר ת\"א היו אביב גפן (השיר 'לבכות לך') ושלמה ארצי. אביב גפן כתב את 'לעולם אחי' באותו לילה, ב-3 בלילה."
    year: 1995

  - date: "11-29"
    text: "ב-29 בנובמבר 1947 — יום כ\"ט בנובמבר — שודרה ב'קול ירושלים' הצבעת האו\"ם בשידור חי. שמואל רוזן (אחיו של הקומפוזיטור גיל אלדמע) שיחק את הקריין בשעה שהוקלטה התוצאה."
    year: 1947

  # דצמבר
  - date: "12-08"
    text: "ב-8 בדצמבר 1980 נורה ג'ון לנון בניו יורק. למחרת בבוקר, להקת כוורת — שלא עוד הייתה פעילה — נפגשה לפגישה ספונטנית בביתו של דני סנדרסון. זו הייתה הפגישה הראשונה אחרי 4 שנים."
    year: 1980

  - date: "12-15"
    text: "ב-15 בדצמבר 1992 כתב חנוך לוין את הטיוטה הראשונה של 'מלכת אמבטיה' — מיוזיקל סאטירי שלא הוצג מעולם. הוא נמצא בעזבונו אחרי מותו ב-1999, וטרם הוצג. תיאטרון הבימה בעבודה."
    year: 1992

  # ינואר
  - date: "01-15"
    text: "ב-15 בינואר 1956 הוצגה לראשונה 'בעקבות הזהב' — המחזה הראשון של חנוך לוין כתלמיד תיכון בן 17. ההצגה התקיימה במועדון 'הצריף' בתל אביב, ל-30 צופים."
    year: 1956

  - date: "01-25"
    text: "ב-25 בינואר 1989 שוחרר מהכלא יהודי-ערבי בשם מאהר ג'ולאני אחרי שריצה 13 שנה על הריגה. הוא חזר לתל אביב והצטרף ללהקת מאשינה — וכתב להם את השיר 'צבא של אהבה' מהזיכרונות שלו מהכלא."
    year: 1989

  # פברואר
  - date: "02-08"
    text: "ב-8 בפברואר 1976 ניגנו אלברט אלגרין ועוזי חיטמן ביחד באולפן את השיר 'ירדה השמש בכינרת'. הם לא דיברו אחד עם השני 8 שעות — סכסוך מי כותב את הבית הראשון. הם פתרו את זה בקלפים."
    year: 1976

  # מרץ
  - date: "03-13"
    text: "ב-13 במרץ 1976 — בוצע השיר 'אז מה' של דני סנדרסון לראשונה במופע. בלי ניהל הופעה. סנדרסון התחיל ליצור את השיר באמצע ההופעה לפי תגובות הקהל. ההקלטה הראשונה הייתה כעבור שנתיים."
    year: 1976

  # אפריל
  - date: "04-19"
    text: "ב-19 באפריל 1948 — חודש לפני הכרזת המדינה — נכתב השיר 'אשרי הגפרור' של חנה סנש על ידיה ביוונית בתחילה (היא חיה במצרים). תורגם לעברית רק שנה אחרי מותה."
    year: 1948
