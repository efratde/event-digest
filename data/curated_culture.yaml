# Curated lists of Israeli artists, performers, directors, and genres.
# Used to populate the questionnaire and the preferences editor with
# meaningful suggestions instead of raw scraper output (which contains
# show titles, ensemble names, multi-artist combos, etc.).
#
# Skewed toward what a 70-year-old Tel Aviv resident might recognize —
# weighted to classic Israeli music and the established stage scene,
# with some newer names too.

# === Top-level event categories (Question 1 of the questionnaire) ===
# Reflects what actually appears in scraped data + common Israeli categories.
event_categories:
  - {key: theater,    label: "Plays / Theater"}
  - {key: music,      label: "Music / Concerts"}
  - {key: standup,    label: "Standup / Entertainment"}
  - {key: musicals,   label: "Musicals"}
  - {key: dance,      label: "Dance"}
  - {key: tribute,    label: "Tribute nights and tribute bands"}
  - {key: parties,    label: "Parties / Dance nights"}
  - {key: lectures,   label: "Lectures / Meetups"}
  - {key: literature, label: "Literature / Poetry"}
  - {key: movies,     label: "Films / Cinema"}
  - {key: festivals,  label: "Festivals / Specials"}
  - {key: kids,       label: "Kids and family"}
  - {key: family,     label: "Family entertainment / Experiences"}

# === Music sub-genres (Question 2 — only if "music" selected) ===
music_subgenres:
  - "Classic Israeli music (Arik Einstein, Shalom Hanoch, Matti Caspi)"
  - "Contemporary Israeli music (Shlomi Shaban, Berry Sakharof)"
  - "Mediterranean / Mizrahi"
  - "Rock / Pop"
  - "Jazz"
  - "World music"
  - "Tribute to hit bands (Tribute bands)"

