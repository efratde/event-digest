# Curated lists of Israeli artists, performers, directors, and genres.
# Used to populate the questionnaire and the preferences editor with
# meaningful suggestions instead of raw scraper output (which contains
# show titles, ensemble names, multi-artist combos, etc.).
#
# Skewed toward what a 70-year-old Tel Aviv resident might recognize —
# weighted to classic Israeli music and the established stage scene,
# with some newer names too.

# === Top-level event categories (Question 1 of the questionnaire) ===
# Reflects what actually appears in scraped data + common Israeli categories.
event_categories:
  - {key: theater,    label: "הצגות / תיאטרון"}
  - {key: music,      label: "מוזיקה / קונצרטים"}
  - {key: standup,    label: "סטנדאפ / בידור"}
  - {key: musicals,   label: "מחזות זמר"}
  - {key: dance,      label: "מחול"}
  - {key: tribute,    label: "ערבי מחווה ולהקות מחווה"}
  - {key: parties,    label: "מסיבות / ערבי ריקודים"}
  - {key: lectures,   label: "הרצאות / מפגשים"}
  - {key: literature, label: "ספרות / שירה"}
  - {key: movies,     label: "סרטים / קולנוע"}
  - {key: festivals,  label: "פסטיבלים / מיוחדים"}
  - {key: kids,       label: "ילדים ומשפחה"}
  - {key: family,     label: "בידור משפחתי / חוויות"}

# === Music sub-genres (Question 2 — only if "music" selected) ===
music_subgenres:
  - "מוזיקה ישראלית קלאסית (אריק איינשטיין, שלום חנוך, מתי כספי)"
  - "מוזיקה ישראלית עכשווית (שלמי שבן, ברי סחרוף)"
  - "ים-תיכוני / מזרחית"
  - "רוק / פופ"
  - "ג'אז"
  - "מוזיקה עולמית"
  - "מחווה ללהקות מצליחות (Tribute bands)"

