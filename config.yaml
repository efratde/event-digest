# Configuration for the daily ticket digest

recipient:
  name: "Demo User"
  home_address: "Dizengoff Center, Tel Aviv"  # public landmark, geocoded by OSM - demo origin only
  home_city: "Tel Aviv"
  max_travel_minutes: 60

preferences:
  # Genres to INCLUDE (anything not listed is excluded by default after we add classification)
  include_genres:
    - "Theatre"
    - "Stand-up"
    - "Israeli Music"
    - "Musicals"
    - "Festivals"
    - "Rock/Pop Music"
    - "Jazz"
    - "Mizrahi"
  # Explicit excludes (override include if ambiguous)
  exclude_genres:
    - "Classical Music"
    - "Ballet"
    - "Opera"
    - "Children"
  # Front-center seat preference (used in v2 for actual seat detection)
  preferred_seats:
    rows: [1, 2, 3, 4, 5]
    section: "Center"

# Sources to scrape, with rough drive-time from Tel Aviv (minutes)
sources:
  - id: habima
    name: "Habima Theatre"
    city: "Tel Aviv"
    geocode_query: "Habima Square, Tel Aviv"   # OSM doesn't index "Habima Theater" by name
    enabled: true
  - id: cameri
    name: "Cameri Theatre"
    city: "Tel Aviv"
    geocode_query: "Tel Aviv Performing Arts Center, Tel Aviv"  # the Cameri at the Performing Arts Center
    enabled: true
  - id: lessin
    name: "Lessin Theatre"
    city: "Tel Aviv"
    geocode_query: "Lessin Theatre, Tel Aviv"
    enabled: true
  - id: tzavta
    name: "Tzavta"
    city: "Tel Aviv"
    geocode_query: "Tzavta, Tel Aviv"
    enabled: true
  - id: zappa_tlv
    name: "Zappa Tel Aviv"
    city: "Tel Aviv"
    geocode_query: "Zappa Tel Aviv"
    enabled: true
  - id: zappa_herzliya
    name: "Zappa Herzliya"
    city: "Herzliya"
    geocode_query: "Zappa Herzliya"
    enabled: true
  - id: shuni
    name: "Shuni Amphitheatre"
    city: "Binyamina"
    geocode_query: "Shuni Park, Binyamina"
    enabled: true
  - id: heichal_tlv
    name: "Tel Aviv Culture Palace (Bronfman)"
    city: "Tel Aviv"
    geocode_query: "Tel Aviv Culture Palace, Tel Aviv"
    enabled: true
  - id: caesarea
    name: "Caesarea Amphitheatre"
    city: "Caesarea"
    geocode_query: "Caesarea Amphitheater"
    enabled: true
  - id: gesher
    name: "Gesher Theatre"
    city: "Jaffa"
    geocode_query: "Nachalat Binyamin 28, Tel Aviv-Jaffa"
    enabled: true
  - id: barby
    name: "Barby Club"
    city: "Tel Aviv"
    geocode_query: "Kibbutz Galuyot 52, Tel Aviv"
    enabled: true
  - id: suzanne_dellal
    name: "Suzanne Dellal Center"
    city: "Tel Aviv"
    geocode_query: "Suzanne Dellal Center, Tel Aviv"
    enabled: true
  - id: heichal_givatayim
    name: "Givatayim Culture Hall"
    city: "Givatayim"
    geocode_query: "Givatayim Theatre"
    enabled: true
  - id: reading3
    name: "Reading 3"
    city: "Tel Aviv"
    geocode_query: "Reading 3, Tel Aviv"
    enabled: true
  - id: tmuna
    name: "Tmuna Theatre"
    city: "Tel Aviv"
    geocode_query: "Soncino 8, Tel Aviv"
    enabled: true
  - id: yoram_loewenstein
    name: "Yoram Loewenstein Studio"
    city: "Tel Aviv"
    geocode_query: "Yesod HaMa'ala 17, Tel Aviv"
    enabled: true
  - id: hasimta
    name: "HaSimta Theatre"
    city: "Jaffa"
    geocode_query: "Mazal Arie 8, Jaffa"
    enabled: true

# How many days back is "fresh"
freshness:
  fresh_days: 7   # First-seen within last N days = "🆕 New"
  warm_days: 21  # First-seen within last N days = "Relatively fresh"
  # older = "Established"

# Output
output:
  html_path: "output/index.html"   # static-host friendly
